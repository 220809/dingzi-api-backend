server:
  port: 10010

spring:
  application:
    name: ding-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: ding-interfaces
              uri: http://localhost:9000
              predicates:
                - Path=/api/**
              filters:
                - InterfaceAuth=0,0

logging:
  level:
    org:
      springframework:
        cloud: trace

dubbo:
  registry:
    address: nacos://${nacos.address:127.0.0.1}:8848?username=nacos&password=nacos
    # This will enable application-level service discovery only (the recommended service discovery method for Dubbo3).
    # For users upgrading from Dubbo2.x, please set the value to 'all' for smooth migration.
    register-mode: instance
  protocol:
    name: tri
    port: 50051
  application:
    name: DubboDemoConsumerApplication
    logger: slf4j
